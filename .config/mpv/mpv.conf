# Sensible defaults for mpv
# Hardware video decoding (VA-API on Linux, VideoToolbox on macOS, D3D11 on Windows)
# Reduces CPU usage and improves battery life. Falls back to software if unavailable.
hwdec=auto-safe

# High-quality scaling when upscaling video
# Uses ewa_lanczos for crisp detail with minimal ringing. Better than default bilinear.
scale=ewa_lanczos

# High-quality scaling when downscaling video
# dscale=mitchell prevents aliasing and keeps lines sharp during downscale.
dscale=mitchell

# Chroma upscaling quality
# Videos store color at lower resolution. This improves color edge clarity.
cscale=spline36

# Debanding filter
# Removes color banding artifacts common in compressed video (gradients, skies).
# Slight performance cost, large visual improvement.
deband=yes

# Audio normalization
# Prevents volume spikes between files. Useful for mixed content or playlists.
volume-max=150
volume-normalize=yes

# Subtitle rendering
# Use embedded fonts if present. Improves subtitle fidelity.
embeddedfonts=yes
sub-font-size=40
sub-border-size=2
sub-shadow-offset=1

# Save playback position on quit
# Resume where you left off automatically.
save-position-on-quit=yes

# Force window to stay on top when paused (useful for reference/pause frame)
# Uncomment if desired:
#ontop=yes

# Force exact display refresh rate synchronization
# Eliminates judder at cost of slightly higher CPU/GPU.
video-sync=display-resample

# Cache settings for network streams
# Pre-buffer before playback starts. Prevents stutter on slow connections.
cache=yes
cache-secs=30
demuxer-max-bytes=500M
demuxer-max-back-bytes=100M

# Behavior
# Don't show logo/art when idle; show black screen.
idle=no
force-window=immediate

# OSD / UI
osc=no                          # Disable built-in bottom bar; use uosc or keyboard
border=no                       # No window decorations (set yes if you want native borders)
keep-open=yes                   # Keep player open when video ends
force-seekable=yes              # Allow seeking in unseekable formats where possible

# Screenshots
screenshot-format=png
screenshot-template=~/Pictures/mpv/%F-%n

# Input
# Allow seeking with arrow keys frame-exact when paused.
hr-seek-framedrop=no

# Audio language preference: English first, then Norwegian
alang=en,eng,no,nor
# Subtitle language preference: Norwegian first, then English
slang=no,nor,en,eng

# GPU context priority (macOS Metal, others default)
# macos-force-dedicated-gpu=yes

# Log quiet by default; errors still shown.
msg-level=all=warn
